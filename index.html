<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conceptify</title>
    <!-- Pre-paint background in the shell's paper tones so the window never
         flashes white (or black) before the bundle applies the real theme. -->
    <style>
      html {
        background: #f1ede2;
      }
      @media (prefers-color-scheme: dark) {
        html {
          background: #100d08;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
